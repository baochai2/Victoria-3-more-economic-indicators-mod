l_braz_por:
 GDP_GROWTH_RATE_SHORT:0 "[Concept('concept_gdp_growth_rate', '$concept_gdp_growth_rate_short$')]"

 INDICATORS_GDP_TOOLTIP:0 "Início do ano $GDP_SHORT$: #variable @money![Country.MakeScope.Var('year_start_gdp').GetValue|Dv]#!\n$TOOLTIP_DELIMITER$\nProjeção anual de $GDP_GROWTH_RATE_SHORT$: #variable [Country.MakeScope.Var('gdp_growth_rate').GetValue|+=%2]#! ($RANKING_BY_GDP_GROWTH_RATE$)\n$GDP_GROWTH_RATE_SHORT$ este ano: #variable [Country.MakeScope.Var('real_gdp_growth_rate').GetValue|+=%2]#! (#variable @money![Country.MakeScope.Var('gdp_diff').GetValue|=Dv]#!)\n$GDP_GROWTH_RATE_SHORT$ no ano passado: #variable [Country.MakeScope.Var('last_year_gdp_growth_rate').GetValue|+=%2]#!"

 RANKING_BY_GDP_GROWTH_RATE:0 "#tooltippable;tooltip:[Country.GetTooltipTag],RANKING_BY_GDP_GROWTH_RATE_TOOLTIP $RANKING_BY_GDP_GROWTH_RATE_TOOLTIP_TEXT$#!"
 RANKING_BY_GDP_GROWTH_RATE_TOOLTIP:0 "$RANKING_BY_GDP_GROWTH_RATE_TOOLTIP_HEADER$\n[GetScriptedGui('ranking_by_gdp_growth_rate_sgui').ExecuteTooltip(GuiScope.SetRoot(GetPlayer.MakeScope).End)]"
 RANKING_BY_GDP_GROWTH_RATE_TOOLTIP_HEADER:0 "Projeção anual de $GDP_GROWTH_RATE_SHORT$ das 10 maiores economias"
 RANKING_BY_GDP_GROWTH_RATE_SGUI_CUSTOM_TOOLTIP:0 "[THIS.Var('ranking_by_gdp_growth_rate').GetValue]. [THIS.Var('gdp_growth_rate').GetValue|+=%2] (#variable @money![THIS.Var('gdp_net_growth').GetValue|=Dv]#!) - [THIS.GetCountry.GetName]"
 RANKING_BY_GDP_GROWTH_RATE_TOOLTIP_TEXT:0 "[SelectLocalization(GreaterThan_CFixedPoint(Country.MakeScope.Var('ranking_by_gdp_growth_rate').GetValue, '(CFixedPoint)0'), 'RANKING_BY_GDP_GROWTH_RATE_VALUE', 'NOT_AVAILABLE')]"
 RANKING_BY_GDP_GROWTH_RATE_VALUE:0 "#white ##[Country.MakeScope.Var('ranking_by_gdp_growth_rate').GetValue]#!"

 INDICATORS_CREDIT_DESC:0 "[concept_debt_growth_rate] real: #tooltippable;tooltip:[GetPlayer.GetTooltipTag],DEBT_GDP_GROWTH_RATE_BALANCE #variable [GetPlayer.MakeScope.Var('real_debt_growth_rate').GetValue|-=%2]#!#!#! (#variable @money![GetPlayer.MakeScope.Var('debt_diff').GetValue|=Dv]#!)\n[concept_debt_to_gdp_ratio]: #variable [GetPlayer.MakeScope.Var('debt_to_gdp_ratio').GetValue|%2]#!"
 DEBT_GDP_GROWTH_RATE_BALANCE:0 "#header Dívida vs PIB#!\n[concept_debt_growth_rate] real: #variable [GetPlayer.MakeScope.Var('real_debt_growth_rate').GetValue|-=%2]#!\n$GDP_GROWTH_RATE_SHORT$ real: #variable [Country.MakeScope.Var('real_gdp_growth_rate').GetValue|+=%2]#!\n$TOOLTIP_DELIMITER$\n[concept_debt_GDP_growth_rate_balance]: #variable [Country.MakeScope.Var('debt_GDP_growth_rate_balance').GetValue|+=%2]#!\nValores abaixo de 0% podem indicar uma política fiscal insustentável."