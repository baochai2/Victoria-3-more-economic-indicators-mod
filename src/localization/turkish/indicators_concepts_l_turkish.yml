 concept_gdp_growth_rate:0 "Gayri Safi Yurt İçi Hasıla Büyüme Oranı"
 concept_gdp_growth_rate_short:0 "GSYİH Büyüme Oranı"
 concept_gdp_growth_rate_desc:0 "[concept_country]’nizin [concept_gdp]’sindeki yıllıklandırılmış değişimdir. Tüm [Concept('concept_building','$concept_buildings$')] içinde istihdam edilen [Concept('concept_pop','$concept_pops$')] tarafından üretilen toplam çıktıda meydana gelen değişiklikleri yansıtır; bu değişiklikler [concept_pop_growth], [concept_construction] yoluyla yapılan yatırımlar ve gelişmiş [Concept('concept_production_method','$concept_production_methods$')] tarafından şekillenir. Sürekli bir [Concept('concept_gdp_growth_rate','$concept_gdp_growth_rate_short$')] $concept_credit_limit$ büyüme oranını ve [Concept('concept_loyalist','$concept_loyalists$')] ile [Concept('concept_radical','$concept_radicals$')] sayısını etkileyebilir."

 concept_debt_growth_rate:0 "Borç Büyüme Oranı"
 concept_debt_growth_rate_desc:0 "Bir [concept_country] ülkesinin toplam [concept_loans] miktarının yıllık artış veya azalış oranı. [concept_debt_growth_rate], $GDP_GROWTH_RATE_SHORT$ değerinin iki katından düşük kaldığı sürece ekonominiz hâlâ $concept_economy_health_healthy_short$ olarak kabul edilir. Ekonominizi büyütmek için daha fazla borç alın!!!"

 concept_debt_to_gdp_ratio:0 "Borç / GSYİH Oranı"
 concept_debt_to_gdp_ratio_desc:0 "Bir [concept_country] ülkesinin birikmiş borcunun $GDP_SHORT$ değerine oranı."

 concept_debt_GDP_growth_rate_balance:0 "Borç ve GSYİH Büyüme Dengesi"
 concept_debt_GDP_growth_rate_balance_desc:0 "Bu denge >= 0 olduğu sürece ekonominiz $concept_economy_health_healthy_short$ olarak kalır."