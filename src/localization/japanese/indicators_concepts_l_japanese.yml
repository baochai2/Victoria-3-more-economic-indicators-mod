l_japanese:
 concept_gdp_growth_rate:0 "国内総生産成長率"
 concept_gdp_growth_rate_short:0 "GDP成長率"
 concept_gdp_growth_rate_desc:0 "あなたの[concept_country]の[concept_gdp]の年率換算による変化。これは、すべての[Concept('concept_building','$concept_buildings$')]で雇用されている[Concept('concept_pop','$concept_pops$')]によって生み出される総生産量の変化を反映し、[concept_pop_growth]、[concept_construction]による投資、そして高度な[Concept('concept_production_method','$concept_production_methods$')]の影響を受けます。持続的な[Concept('concept_gdp_growth_rate','$concept_gdp_growth_rate_short$')]は、$concept_credit_limit$の成長率や[Concept('concept_loyalist','$concept_loyalists$')]および[Concept('concept_radical','$concept_radicals$')]の数に影響を与える可能性があります。"

 concept_debt_growth_rate:0 "債務成長率"
 concept_debt_growth_rate_desc:0 "[concept_country] の総 [concept_loans] が増加または減少する年間の割合。[concept_debt_growth_rate] が $GDP_GROWTH_RATE_SHORT$ の2倍未満である限り、あなたの経済は依然として $concept_economy_health_healthy_short$ と見なされます。より多く借り入れて経済を成長させましょう！！！"

 concept_debt_to_gdp_ratio:0 "債務対GDP比率"
 concept_debt_to_gdp_ratio_desc:0 "[concept_country] の累積債務と $GDP_SHORT$ の比率。"

 concept_debt_GDP_growth_rate_balance:0 "債務とGDP成長率のバランス"
 concept_debt_GDP_growth_rate_balance_desc:0 "このバランスが >= 0 の限り、あなたの経済は $concept_economy_health_healthy_short$ の状態を維持します。"