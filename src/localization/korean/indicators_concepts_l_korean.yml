l_korean:
 concept_gdp_growth_rate:0 "국내총생산 성장률"
 concept_gdp_growth_rate_short:0 "GDP 성장률"
 concept_gdp_growth_rate_desc:0 "당신의 [concept_country]의 [concept_gdp]의 연율 환산 변화입니다. 이는 모든 [Concept('concept_building','$concept_buildings$')]에서 고용된 [Concept('concept_pop','$concept_pops$')]이 생산하는 총 산출량의 변화를 반영하며, [concept_pop_growth], [concept_construction]을 통한 투자, 그리고 발전된 [Concept('concept_production_method','$concept_production_methods$')]의 영향을 받습니다. 지속적인 [Concept('concept_gdp_growth_rate','$concept_gdp_growth_rate_short$')]은 $concept_credit_limit$의 성장률과 [Concept('concept_loyalist','$concept_loyalists$')] 및 [Concept('concept_radical','$concept_radicals$')]의 수에 영향을 줄 수 있습니다."

 concept_debt_growth_rate:0 "부채 증가율"
 concept_debt_growth_rate_desc:0 "[concept_country]의 총[concept_loans]이 증가하거나 감소하는 연간 비율입니다. [concept_debt_growth_rate]가$GDP_GROWTH_RATE_SHORT$의 두 배 미만으로 유지되는 한, 경제는 여전히$concept_economy_health_healthy_short$상태로 간주됩니다. 더 많이 차입하여 경제 성장을 촉진하십시오!!!"

 concept_debt_to_gdp_ratio:0 "부채 대비 GDP 비율"
 concept_debt_to_gdp_ratio_desc:0 "[concept_country]의 누적 부채와$GDP_SHORT$사이의 비율입니다."

 concept_debt_GDP_growth_rate_balance:0 "부채와 GDP 성장률 균형"
 concept_debt_GDP_growth_rate_balance_desc:0 "이 균형이 >= 0인 한 경제는$concept_economy_health_healthy_short$상태를 유지합니다."