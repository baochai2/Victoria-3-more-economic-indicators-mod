l_korean:
 GDP_GROWTH_RATE_SHORT:0 "[Concept('concept_gdp_growth_rate', '$concept_gdp_growth_rate_short$')]"

 INDICATORS_GDP_TOOLTIP:0 "연초 $GDP_SHORT$: #variable @money![Country.MakeScope.Var('year_start_gdp').GetValue|Dv]#!\n$TOOLTIP_DELIMITER$\n연간 예상 $GDP_GROWTH_RATE_SHORT$: #variable [Country.MakeScope.Var('gdp_growth_rate').GetValue|+=%2]#! ($RANKING_BY_GDP_GROWTH_RATE$)\n올해 $GDP_GROWTH_RATE_SHORT$: #variable [Country.MakeScope.Var('real_gdp_growth_rate').GetValue|+=%2]#! (#variable @money![Country.MakeScope.Var('gdp_diff').GetValue|=Dv]#!)\n작년 $GDP_GROWTH_RATE_SHORT$: #variable [Country.MakeScope.Var('last_year_gdp_growth_rate').GetValue|+=%2]#!"

 RANKING_BY_GDP_GROWTH_RATE:0 "#tooltippable;tooltip:[Country.GetTooltipTag],RANKING_BY_GDP_GROWTH_RATE_TOOLTIP $RANKING_BY_GDP_GROWTH_RATE_TOOLTIP_TEXT$#!"
 RANKING_BY_GDP_GROWTH_RATE_TOOLTIP:0 "$RANKING_BY_GDP_GROWTH_RATE_TOOLTIP_HEADER$\n[GetScriptedGui('ranking_by_gdp_growth_rate_sgui').ExecuteTooltip(GuiScope.SetRoot(GetPlayer.MakeScope).End)]"
 RANKING_BY_GDP_GROWTH_RATE_TOOLTIP_HEADER:0 "상위 10개 경제의 연간 예상 $GDP_GROWTH_RATE_SHORT$"
 RANKING_BY_GDP_GROWTH_RATE_SGUI_CUSTOM_TOOLTIP:0 "[THIS.Var('ranking_by_gdp_growth_rate').GetValue]. [THIS.Var('gdp_growth_rate').GetValue|+=%2] (#variable @money![THIS.Var('gdp_net_growth').GetValue|=Dv]#!) - [THIS.GetCountry.GetName]"
 RANKING_BY_GDP_GROWTH_RATE_TOOLTIP_TEXT:0 "[SelectLocalization(GreaterThan_CFixedPoint(Country.MakeScope.Var('ranking_by_gdp_growth_rate').GetValue, '(CFixedPoint)0'), 'RANKING_BY_GDP_GROWTH_RATE_VALUE', 'NOT_AVAILABLE')]"
 RANKING_BY_GDP_GROWTH_RATE_VALUE:0 "#white ##[Country.MakeScope.Var('ranking_by_gdp_growth_rate').GetValue]#!"

 INDICATORS_CREDIT_DESC:0 "실질 [concept_debt_growth_rate]: #tooltippable;tooltip:[GetPlayer.GetTooltipTag],DEBT_GDP_GROWTH_RATE_BALANCE #variable [GetPlayer.MakeScope.Var('real_debt_growth_rate').GetValue|-=%2]#!#!#! (#variable [GetPlayer.MakeScope.Var('debt_diff').GetValue|=Dv]#!)\n[concept_debt_to_gdp_ratio]: #variable [GetPlayer.MakeScope.Var('debt_to_gdp_ratio').GetValue|%2]#!"
 DEBT_GDP_GROWTH_RATE_BALANCE:0 "#header 부채 vs GDP#!\n실질 [concept_debt_growth_rate]: #variable [GetPlayer.MakeScope.Var('real_debt_growth_rate').GetValue|-=%2]#!\n실질 $GDP_GROWTH_RATE_SHORT$: #variable [Country.MakeScope.Var('real_gdp_growth_rate').GetValue|+=%2]#!\n$TOOLTIP_DELIMITER$\n[concept_debt_GDP_growth_rate_balance]: #variable [Country.MakeScope.Var('debt_GDP_growth_rate_balance').GetValue|+=%2]#!\n0% 미만의 값은 지속 불가능한 재정 정책을 나타낼 수 있습니다."