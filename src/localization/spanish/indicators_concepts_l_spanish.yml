l_spanish:
 concept_gdp_growth_rate:0 "Tasa de crecimiento del producto interno bruto"
 concept_gdp_growth_rate_short:0 "Tasa de crecimiento del PIB"
 concept_gdp_growth_rate_desc:0 "El cambio anualizado del [concept_gdp] de tu [concept_country]. Refleja los cambios en la producción total generada por los [Concept('concept_pop','$concept_pops$')] empleados en todos los [Concept('concept_building','$concept_buildings$')], influenciada por [concept_pop_growth], la inversión mediante [concept_construction] y los [Concept('concept_production_method','$concept_production_methods$')] avanzados. Un [Concept('concept_gdp_growth_rate','$concept_gdp_growth_rate_short$')] sostenido puede influir en la tasa de crecimiento del $concept_credit_limit$ y en el número de [Concept('concept_loyalist','$concept_loyalists$')] y [Concept('concept_radical','$concept_radicals$')]."

 concept_debt_growth_rate:0 "Tasa de crecimiento de la deuda"
 concept_debt_growth_rate_desc:0 "La tasa anual a la que el total de [concept_loans] de un [concept_country] aumenta o disminuye. Si [concept_debt_growth_rate] se mantiene por debajo del doble de $GDP_GROWTH_RATE_SHORT$, tu economía todavía se considera $concept_economy_health_healthy_short$. ¡Pide más préstamos para impulsar tu economía!!!"

 concept_debt_to_gdp_ratio:0 "Relación deuda/PIB"
 concept_debt_to_gdp_ratio_desc:0 "La relación entre la acumulación de deuda de un [concept_country] y su $GDP_SHORT$."

 concept_debt_GDP_growth_rate_balance:0 "Equilibrio entre crecimiento de deuda y PIB"
 concept_debt_GDP_growth_rate_balance_desc:0 "Mientras este equilibrio >= 0, tu economía permanece $concept_economy_health_healthy_short$."